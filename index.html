<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilos/style.css">
    <link rel="stylesheet" href="estilos/tablet.css" media="screen and (min-width: 768px)">
    <link rel="stylesheet" href="estilos/desktop.css" media="screen and (min-width: 992px)">
    <title>Filmes</title>
</head>
<body class="dark">
    
    <section id="allSection">

            <header id="ficha"> 

            <nav>
                <h1>Films🎬</h1>
                <ul id="ulFicha">
                    <li><a href="#populares">Filmes Populares</a></li>
                    <li><a href="#alta">Filmes em Alta</a></li>
                    <li><a href="#avaliados">Melhores Avaliados</a></li>
                    <li><a href="#premium">Seja Premium</a></li>
                </ul>
            </nav>
        </header>

        <main>
            <div class="hero">
                <div id="pesquisa-container">
                        <input type="text" id="pesquisa" placeholder="🔎︎ Pesquisar Filmes...">
                </div>

                <div id="resultadoPesquisa" style="display: none;">
                    <h1 id="tituloPesquisa"></h1>
                    <div id="listaPesquisa" class="cardMain"></div>
                </div>

            <div id="paaCards">
                <section id="populares">
                    <h1>Filmes Populares</h1>
                    <div id="listaPopulares" class="cardMain"></div>
                </section>
                <section id="alta">
                    <h1>Filmes em Alta</h1>
                    <div id="listaAlta" class="cardMain"></div>
                </section>
                <section id="avaliados">
                    <h1>Melhores Avaliados</h1>
                    <div id="listaAvaliados" class="cardMain"></div>
                </section>
            </div>
        </main>
    </section>

    <script src="scripts/script.js"></script>
    <script src="scripts/config.js"></script>
</body>
</html>
